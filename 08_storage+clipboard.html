<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스토리지, 클립보드</title>
  </head>
  <body>
    <button id="copy">복사</button>
    <script>
      // localStorage, sessionStorage
      //   sessionStorage.setItem("counter", 0);
      //   sessionStorage.getItem("counter");
      // console.log(sessionStorage.getItem("counter")); // null
      // sessionStorage : 출처 & 특정 탭에 종속, 탭 종료 시 소멸
      let a = sessionStorage.getItem("counter") ?? 0;
      a++;
      console.log(a);
      sessionStorage.setItem("counter", a);

      // localStorage : 출처만 같으면 영속
      let b = localStorage.getItem("counter") ?? 0;
      b++;
      console.log(b);
      localStorage.setItem("counter", b);
      // storage <- localStorage
      window.addEventListener("storage", () => {
        console.log("스토리지 변동!");
      });

      // 주의할 점 : local/session storage -> key string, value string, 알아서 string으로 변환

      const o = {
        name: "윌리엄",
        job: "반찬가게 사장",
      };
      localStorage.setItem("o", o);
      localStorage.setItem("o2", JSON.stringify(o));
      console.log(localStorage.getItem("o2"));
      console.log(JSON.parse(localStorage.getItem("o2")));
      const aa = ["김치", "간장게장"];
      localStorage.setItem("aa", aa);
      localStorage.setItem("aa2", JSON.stringify(aa));

      document.querySelector("#copy").addEventListener("click", async () => {
        // 복사된 데이터가 임시 존재하는 메모리 공간 => 클립보드
        console.log(`기존 데이터 : ${await navigator.clipboard.readText()}`);
        console.log("부자가 되는 방법이 복사가 되었습니다");
        navigator.clipboard.writeText("부자가 되는 방법");
      });
    </script>
  </body>
</html>
